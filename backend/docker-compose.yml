

services:
  backend:
    build: .
    container_name: biye-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379  # ← Dentro de Docker network
      - MONGODB_URI=${MONGODB_URI}
    depends_on:
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - biye-network

  redis:
    image: redis:7-alpine
    container_name: biye-redis
    ports:
      - "6379:6379"  # ← Exponer Redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - biye-network

  mongodb:
    image: mongo:latest
    container_name: biye-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: supersecretpassword
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - biye-network

networks:
  biye-network:
    driver: bridge

volumes:
  redis_data:
  mongodb_data: