name: biye
description: "E-commerce platform with Flutter frontend"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"  # Más permisivo

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  carousel_slider: ^5.1.1
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # State Management & Architecture
  equatable: ^2.0.7
  dartz: ^0.10.1
  bloc: ^9.0.0
  flutter_bloc: ^9.1.1
  hydrated_bloc: ^10.1.1

  # Firebase
  firebase_core: ^4.1.0
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.0.1

  # Network & APIs
  http: ^1.5.0

  # Navigation & URLs
  flutter_custom_tabs: ^2.4.0
  url_launcher: ^6.3.2

  # Utilities
  intl: ^0.20.2
  path_provider: ^2.1.5
  image_picker: ^1.2.1
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/aiconbe.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
